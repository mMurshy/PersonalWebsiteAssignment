<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">

    <!-- CSS added here-->
     <link rel="stylesheet" href="Vendor/lightbox3/dist/lightbox3.css">

<body>

  
  <section class="topbar">
    <h1>everything under the sun</h1>
  </section>


  <section class="tools-board">
    <div class="row colors">
      <label hidden class="title">Colors</label>
      <ul class="options">
        <li class="option"></li>
        <li class="option"></li>
        <li class="option"></li>
        <li class="option"></li>
        <li class="option"></li>
        <li class="option"></li>
        <li class="option"></li>
        <li class="option"></li>
        <li class="option"></li>
        <li class="option"></li>
        <li class="option selected"></li>
        <li class="option">
          <input type="color" id="color-picker" value="#853e81">
        </li>
      </ul>
    </div>

    <div class="row">
      <label hidden class="title">Options</label>
      <ul class="options">
        <li class="option active">
          <span hidden>Brush</span>
        </li>
          <li class="option">
        <input type="range" id="size-slider" min="1" max="55" value="5">
        </li>
      </ul>
    </div>

    <div class="row buttons">
      <button class="clear-canvas">Clear Canvas</button>
    </div>
  </section>

  <section class="drawing-board">
    <p>Lunula art</p>
    <canvas></canvas>
  </section>


    
  <section class="sidemenu">
    <div class="sidebuttons">
        <p>Commission Guide</p>
    <a href="Icons/CeramicSheet.png" data-lightbox>
      <img src="Icons/CeramicButton.png">
      <a href="Icons/CeramicSheet.png" data-lightbox>
      <img src="Icons/2dButton.png" class="2dButton">
      <a href="Icons/CeramicSheet.png" data-lightbox>
      <img src="Icons/BugButton.png">
      <a href="Icons/CeramicSheet.png" data-lightbox>
      <img src="Icons/3dButton.png">
      <a href="Icons/CeramicSheet.png" data-lightbox>
      <img src="Icons/commissionbutton.png">
        <a href="Icons/CeramicSheet.png" data-lightbox>
      <img src="Icons/commissionbutton.png">
    </a>
 
    </div>
  </section>

  <!-- @Jack: Combined your section with the "Newest Photos" aria-label and your div.carousel -->
  <!-- The way you had it before made it so your CSS grid areas were accidentally working correctly -->
  <!-- for this area. Your section didn't have the grid-area: carousel; applied to it so it filled -->
  <!-- the leftover space. -->
  <section class="carousel" data-carousel aria-label="Newest Photos">
    <button class="carousel-button prev" data-carousel-button="prev"><img src="Icons/arrowLeft.png"></button>
    <button class="carousel-button next" data-carousel-button="next"><img src="Icons/arrowRight.png"></button>
    <ul data-slides>
      <li class="slide" data-active>
        <img src="Icons/profitamole-1-1.jpg">
      </li>
      <li class="slide">
        <img src="icons/profitamoleblue-1-1.png">
      </li>
      <li class="slide">
        <img src="icons/profitamolegreen-1-1.png">
      </li>
    </ul>
  </section>

  <section class="footer">
    <div>
      <ul>
        <li><a >jackmbgrant@gmail.com</a> <img src="Icons/email-logo.png"></li>
        <li><a href="https://www.instagram.com/artlunula/">artlunula</a> <img src="Icons/instagram-logo.png"></li>
      </ul>
    </div>
  </section>
